main_agent:
  tools: []
  max_turns: 1

sub_agents:
  agent-topic-generator:
    tools:
      - tool-google-search
    max_turns: 10
  agent-query-builder:
    tools:
      - tool-google-search
      - tool-image-search
      - tool-vqa
    max_turns: 14
  agent-refiner:
    tools:
      - tool-google-search
      - tool-image-search
      - tool-vqa
    max_turns: 12

keep_tool_result: -1
format_error_retry_limit: 0
